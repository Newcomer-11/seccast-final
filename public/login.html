<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEC//CAST — Admin Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c0a;--surface:#0f1512;--border:#1e2d24;--border2:#243529;
      --green:#00ff88;--green-dim:#00cc6a;--green-dark:#042010;
      --text:#c8ffe0;--muted:#4a7060;
      --mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;
    }
    body{
      font-family:var(--sans);background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:20px; overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(0,255,136,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,136,.04) 1px,transparent 1px);
      background-size:48px 48px;
    }
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
    }

    .card{
      width:100%;max-width:400px;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:8px;
      padding:40px 36px;
      position:relative;z-index:1;
      box-shadow:0 0 60px rgba(0,0,0,.6), 0 0 30px rgba(0,255,136,.04);
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--green),transparent);
      opacity:.4;
    }

    .card-header{text-align:center;margin-bottom:30px;}
    .shield{
      width:52px;height:52px;border-radius:12px;
      background:var(--green-dark);border:1px solid rgba(0,255,136,.3);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 16px;
    }
    .shield svg{width:24px;height:24px;fill:var(--green);}
    h1{font-family:var(--mono);font-size:1.1rem;color:var(--green);letter-spacing:.1em;}
    .sub{font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-top:5px;letter-spacing:.05em;}

    .field{margin-bottom:20px;}
    label{
      display:block;font-family:var(--mono);font-size:.6rem;
      color:var(--muted);letter-spacing:.12em;margin-bottom:7px;
    }
    label::before{content:'> ';color:var(--green);}

    .input-wrap{position:relative;}
    input[type=password]{
      width:100%;padding:11px 14px;
      background:var(--bg);border:1px solid var(--border2);
      border-radius:5px;font-family:var(--mono);font-size:.9rem;
      color:var(--text);outline:none;
      transition:border-color .2s,box-shadow .2s;
      letter-spacing:.1em;
    }
    input[type=password]:focus{
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(0,255,136,.1);
    }
    input[type=password]::placeholder{color:var(--border2);letter-spacing:normal;}

    .submit-btn{
      width:100%;padding:12px;margin-top:4px;
      background:var(--green);color:#000;
      border:none;border-radius:5px;
      font-family:var(--mono);font-size:.8rem;letter-spacing:.12em;
      font-weight:700;cursor:pointer;
      transition:opacity .15s,box-shadow .15s;
      box-shadow:0 0 16px rgba(0,255,136,.25);
    }
    .submit-btn:hover{opacity:.88;box-shadow:0 0 24px rgba(0,255,136,.45);}

    .err{
      background:rgba(255,60,90,.08);border:1px solid rgba(255,60,90,.3);
      color:#ff6b7a;border-radius:5px;padding:9px 14px;
      font-family:var(--mono);font-size:.65rem;letter-spacing:.05em;
      margin-top:12px;display:none;
    }
    .err.show{display:block;}
    .err::before{content:'[ERROR] ';}

    .footer{text-align:center;margin-top:22px;}
    .footer a{
      font-family:var(--mono);font-size:.6rem;color:var(--muted);
      text-decoration:none;letter-spacing:.08em;
    }
    .footer a:hover{color:var(--green);}
    .footer a::before{content:'← ';}
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="shield">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l6 2.67V11c0 3.86-2.64 7.46-6 8.93-3.36-1.47-6-5.07-6-8.93V7.67L12 5z"/></svg>
    </div>
    <h1>ADMIN ACCESS</h1>
    <p class="sub">// SEC//CAST CONTROL PANEL</p>
  </div>

  <form id="login-form">
    <div class="field">
      <label>PASSWORD</label>
      <div class="input-wrap">
        <input type="password" id="pw" placeholder="••••••••••••" autofocus required />
      </div>
    </div>
    <button type="submit" class="submit-btn">AUTHENTICATE</button>
    <div class="err" id="err-msg">Access denied. Invalid credentials.</div>
  </form>

  <div class="footer"><a href="/">Về trang podcast</a></div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw').value;
    const res = await fetch('/admin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:pw})
    });
    if (res.ok) window.location.href = '/admin';
    else {
      document.getElementById('err-msg').classList.add('show');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });
</script>
</body>
</html>
